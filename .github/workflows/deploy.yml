name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Debug - List files
        run: ls -la
      
      - name: Debug - List solution files
        run: find . -name "*.sln" -o -name "*.csproj"

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
          
      - name: Restore dependencies
        # Explicitly point to the solution/project
        run: dotnet restore $(find . -name "*.sln" | head -n 1)
        
      - name: Build
        # Explicitly point to the solution/project
        run: dotnet build $(find . -name "*.sln" | head -n 1) --configuration Release --no-restore
        
      - name: Publish
        # Using the full path to the project file
        run: dotnet publish $(find . -name "*.csproj" | grep -v "obj" | head -n 1) -c Release -o release --nologo
      
      # Configure base path for GitHub Pages (repository name)
      - name: Change base-tag in index.html
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          find release/wwwroot -name "index.html" -exec sed -i "s/<base href=\"\/\" \/>/<base href=\"\/$repo_name\/\" \/>/g" {} \;
      
      # Add .nojekyll file to tell GitHub Pages not to use Jekyll
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll
        
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
